name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch: 

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn
          
      - name: Run preprocessing script
        run: |
          python preprocessing/automate.py
          
      - name: Commit and Push cleaned data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/dataset_preprocessing/cleaned_data.csv
          git commit -m "Auto-update cleaned dataset" || echo "No changes to commit"
          git push